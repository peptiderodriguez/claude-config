site_name: claude-config
site_description: >-
  A researcher's personal Claude Code configuration — scar-tissue rules,
  auto-firing skills, enforcement hooks, custom agents, and durable memory.
site_url: https://peptiderodriguez.github.io/claude-config/
repo_url: https://github.com/peptiderodriguez/claude-config
repo_name: peptiderodriguez/claude-config
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Install:
      - Quickstart: install/index.md
      - Cluster / HPC install: install/cluster.md
      - Syncing changes back: install/sync.md
  - Philosophy:
      - Why scar-tissue rules: philosophy/index.md
      - The CLAUDE.md taxonomy: philosophy/rules.md
      - How auto-firing works: philosophy/auto-firing.md
  - Catalog:
      - Skills (11): catalog/skills.md
      - Hooks (13): catalog/hooks.md
      - Agents (3): catalog/agents.md
      - Memory (9): catalog/memory.md
  - Adapt it:
      - Make it yours: adapt/index.md
      - Build your own (/onboard): adapt/meta-analysis.md
      - Writing an /analyze guide: adapt/analyze-pattern.md
      - Building blocks: adapt/building-blocks.md
  - Provenance: provenance.md
  - Glossary: glossary.md
